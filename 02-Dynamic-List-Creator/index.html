<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic List Creator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Dynamic List Creator</h1>
        <div class="input-box">
            <input type="text" name="item" id="item-input" placeholder="Enter a new item">
            <button id="add-item-btn">Add Item</button>
        </div>
        <ul id="item-list"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
